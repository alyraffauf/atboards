<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}atboards{% endblock %}</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-neutral-950 text-neutral-400 text-sm min-h-screen antialiased flex flex-col" style="font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;">
    <header class="border-b border-neutral-800">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2 text-neutral-500 overflow-x-auto whitespace-nowrap">
                <a href="/" class="shrink-0 hover:opacity-80"><span class="text-amber-500" style="margin-right: 0.1em">@</span><span class="text-neutral-200">boards</span></a>
                {% block breadcrumb %}{% endblock %}
            </div>
            <div class="shrink-0 ml-4 flex items-center gap-3">
                {% if g.user %}
                <a href="/account" class="text-neutral-500 hover:text-neutral-300">{{ g.user.handle }}</a>
                <form method="post" action="/oauth/logout" class="inline">
                    <button type="submit" class="text-neutral-500 hover:text-neutral-300">log out</button>
                </form>
                {% else %}
                <a href="/login" class="text-neutral-500 hover:text-neutral-300">log in</a>
                {% endif %}
            </div>
        </div>
    </header>
    <main class="max-w-2xl mx-auto px-4 py-8 flex-1 w-full">
        {% block content %}{% endblock %}
    </main>
    <footer class="border-t border-neutral-800 mt-auto">
        <div class="max-w-2xl mx-auto px-4 py-6 flex items-center justify-between text-xs text-neutral-500">
            <span>made by <a href="https://aly.codes" class="text-neutral-500 hover:text-neutral-300">aly.codes</a></span>
            <div class="flex items-center gap-4">
                <a href="https://github.com/alyraffauf/atboards" class="text-neutral-500 hover:text-neutral-300">github</a>
                <a href="https://ko-fi.com/alyraffauf" class="text-neutral-500 hover:text-neutral-300">ko-fi</a>
            </div>
        </div>
    </footer>
</body>
</html>
