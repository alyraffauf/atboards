name: Build TUI

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Tailwind CSS
        run: |
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o tailwindcss
          chmod +x tailwindcss

      - name: Build CSS
        run: ./tailwindcss -i web/static/input.css -o web/static/style.css --minify

      - name: Install esbuild
        run: npm install

      - name: Build JS
        run: npx esbuild web/ts/main.ts --bundle --outfile=web/static/app.js --minify

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          gh api repos/alyraffauf/homebrew-tap/dispatches \
            -f event_type=atbbs-release \
            -f "client_payload[version]=$VERSION"
